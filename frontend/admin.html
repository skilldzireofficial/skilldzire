<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillDzire Admin | Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-section { padding: 50px 5%; max-width: 1200px; margin: 0 auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .table-container { background: #111; border-radius: 8px; border: 1px solid #222; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #1a1a1a; color: var(--primary); text-align: left; padding: 18px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #222; }
        td { padding: 15px 18px; border-bottom: 1px solid #222; font-size: 0.9rem; color: #efefef; }
        tr:hover { background: #161616; }
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; background: #222; color: var(--primary); }
        .action-btns { display: flex; gap: 10px; }
        .btn-table { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: 0.3s; }
        .approve { background: var(--primary); color: #000; }
        .approve:hover { background: #ff8533; }
        .delete { background: #333; color: #fff; }
        .delete:hover { background: #cc0000; }
        .loader { text-align: center; padding: 40px; color: #777; }

        /* Custom Status Modal */
        #statusModal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .status-content { background: #1a1a1a; margin: 15% auto; padding: 30px; border-radius: 10px; width: 350px; text-align: center; border-bottom: 4px solid var(--primary); }
        .status-content h3 { margin-bottom: 15px; color: var(--primary); }
        .status-content p { color: #ccc; margin-bottom: 20px; }
        .status-btn { padding: 10px 25px; background: var(--primary); border: none; color: #000; font-weight: 700; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Skill<span>Dzire</span> Admin</div>
        <ul class="nav-links">
            <li><a href="index.html">View Site</a></li>
        </ul>
    </nav>

    <div class="admin-section">
        <div class="admin-header">
            <h2>Pending <span>Requests</span></h2>
            <button class="btn-primary" onclick="fetchRequests()" style="padding: 10px 20px; font-size: 0.8rem;">Refresh List</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Course</th>
                        <th>Email</th>
                        <th>UTR Number</th><th>Status</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="statusModal">
        <div class="status-content">
            <h3 id="modalTitle">Status</h3>
            <p id="modalMessage">Message goes here.</p>
            <button class="status-btn" onclick="closeStatusModal()">Okay</button>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
