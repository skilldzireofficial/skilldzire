<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkillDzire | Internship Certificates</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body>

    <nav>
        <div class="logo"><img src="assets/logo.jpg" alt=""></div>
        
        <button class="hamburger" id="mobileMenuBtn" aria-label="Toggle Navigation Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <ul class="nav-links" id="navLinksList">
            <li class="active-link"><a href="/homepage">Home</a></li>
            <li class="status-item"><a href="/checkstatus" class="status-btn">Check Status</a></li>
            <li><a href="/verification">Verify</a></li>
        </ul>
    </nav>

    <div class="nav-overlay" id="menuOverlay"></div>

    <section class="hero">
        <div class="hero-content">
            <h1>Elevate Your <span>Career</span></h1>
            <p>Your hard work deserves recognition. Claim your industry-standard internship completion certificate today.</p>
            <button class="btn-primary" onclick="openModal()">Get Certificate</button>
        </div>
    </section>

    <div id="certModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2><img src="assets/logo.jpg" alt="" width="100px; height:100px;"></h2>
            <form id="certificateForm">
                <div class="input-box">
                    <input type="text" id="userName" placeholder="Full Name (for certificate)" required>
                </div>
                <div class="input-box">
                    <input type="email" id="userEmail" placeholder="Email Address" required>
                </div>
                <div class="input-box">
                    <input type="text" id="collegeName" placeholder="College Name" required>
                </div>
                <div class="input-box">
                    <input type="text" id="branchRoll" placeholder="Branch & Roll Number" required>
                </div>
                
                <div class="input-box">
                    <select id="course" required>
                        <option value="" disabled selected>Select Internship Domain</option>
                        <option value="Full Stack Web Development">Full Stack Web Development</option>
                        <option value="Data Science & AI">Data Science & AI</option>
                        <option value="Python Programming">Python Programming</option>
                        <option value="Automation Testing">Automation Testing</option>
                    </select>
                </div>

                <div class="duration-section">
                    <label>Internship Period:</label>
                    <div class="date-flex">
                        <input type="date" id="fromDate" required title="Start Date">
                        <span>to</span>
                        <input type="date" id="toDate" required title="End Date">
                    </div>
                </div>

                <div class="price-tag">
                    <p>Processing Fee: <span>₹1</span></p>
                </div>

                <button type="submit" class="submit-btn">Submit & Proceed</button>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // =================================================================
        // 🎯 INTERACTIVE SMOOTH MOBILE MENU NAVIGATION TRRIGERS
        // =================================================================
        const hamburgerBtn = document.getElementById('mobileMenuBtn');
        const navLinks = document.getElementById('navLinksList');
        const menuOverlay = document.getElementById('menuOverlay');

        function toggleMenu() {
            hamburgerBtn.classList.toggle('active');
            navLinks.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            
            if (navLinks.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }

        hamburgerBtn.addEventListener('click', toggleMenu);
        menuOverlay.addEventListener('click', toggleMenu);

        document.querySelectorAll('.nav-links li a').forEach(link => {
            link.addEventListener('click', () => {
                if (navLinks.classList.contains('active')) {
                    toggleMenu();
                }
            });
        });
    </script>
</body>
</html>
