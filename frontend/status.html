<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Status | SkillDzire</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff9800; /* SkillDzire Orange */
            --bg-dark: #000000;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-dim: #aaaaaa;
            --border: #333333;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .status-wrapper {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        h2 { text-align: center; color: var(--primary); letter-spacing: 1px; }

        .status-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        .status-table th, .status-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .status-table th {
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .status-pending { color: #ffeb3b; font-weight: 600; }
        .status-approved { color: #4caf50; font-weight: 600; }

        .btn-edit {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 6px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-edit:hover {
            background: var(--primary);
            color: black;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            width: 90%; max-width: 400px;
            text-align: center;
        }

        .modal-box input, .modal-box select {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #222; border: 1px solid var(--border);
            color: white; border-radius: 5px; box-sizing: border-box;
        }

        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-update { background: var(--primary); color: black; border: none; flex: 1; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: 600; }
        .btn-close { background: #333; color: white; border: none; flex: 1; padding: 10px; border-radius: 5px; cursor: pointer; }

        #loading { text-align: center; color: var(--text-dim); }
        .status-pending-glossy {
    background: linear-gradient(90deg, #ff9800, #ffffff, #ff9800);
    background-size: 200% auto;
    color: #000;
    padding: 6px 15px;
    border-radius: 5px;
    font-weight: 700;
    animation: glossyMove 2s linear infinite;
    display: inline-block;
}
@keyframes glossyMove { to { background-position: 200% center; } }
.edit-icon-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; margin-left: 10px; transition: 0.3s; }
.edit-icon-btn:hover { transform: rotate(20deg) scale(1.2); }
    </style>
</head>
<body>

<div class="status-wrapper">
    <h2>APPLICATION TRACKING</h2>
    <div id="loading">Synchronizing with server...</div>
    
    <table class="status-table" id="statusTable" style="display:none;">
        <thead>
            <tr>
                <th>Applicant & Email</th>
                <th>College & Branch</th>
                <th>Internship Domain</th>
                <th>Period</th>
                <th>Status</th>
            </tr>
        </thead>
            <div id="statusFooter" style="margin-top: 25px; text-align: center;">
            <marquee id="scrollText" behavior="scroll" direction="left" style="color: #ff9800; font-weight: 600; font-size: 1.1rem; background: rgba(255,152,0,0.1); padding: 10px; border-radius: 5px;">
            You can edit your details before approved by admin...
            </marquee>
            </div>
        <tbody id="statusContent"></tbody>
    </table>
</div>

<div id="editModal" class="modal-overlay">
    <div class="modal-box">
        <h3 style="color: var(--primary);">Update Details</h3>
        <input type="text" id="newName" placeholder="Correct Name">
        <select id="newCourse">
            <option value="Full Stack Web Development">Full Stack Web Development</option>
            <option value="Data Science & AI">Data Science & AI</option>
            <option value="Python Programming">Python Programming</option>
            <option value="Automation Testing">Automation Testing</option>
        </select>
        <div class="modal-btns">
            <button class="btn-update" onclick="submitEdit()">Update</button>
            <button class="btn-close" onclick="closeEdit()">Cancel</button>
        </div>
    </div>
</div>

<script src="js/status.js"></script>
</body>
</html>
