<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Application Status | SkillDzire</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <div class="logo"><img src="assets/logo.jpg" alt=""></div>
        
        <button class="hamburger" id="mobileMenuBtn" aria-label="Toggle Navigation Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <ul class="nav-links" id="navLinksList">
            <li><a href="/homepage">Home</a></li>
            <li class="status-item active-link"><a href="/checkstatus" class="status-btn">Check Status</a></li>
            <li><a href="/verification">Verify</a></li>
        </ul>
    </nav>

    <div class="nav-overlay" id="menuOverlay"></div>

    <div class="main-container">
        <div class="status-wrapper">
            <h2>APPLICATION TRACKING</h2>
            <div id="loading">Synchronizing with server...</div>
            
            <div id="statusFooter" style="margin-top: 10px; margin-bottom: 15px; text-align: center;">
                <div id="scrollText" behavior="scroll" direction="left" style="color: rgb(255, 68, 0); font-weight: bold; font-size: 1.1rem; background:rgb(236, 206, 196); padding: 10px; border-radius: 5px;">
                You can edit your details before approved by our team.
                </div>
            </div>

            <div class="table-responsive">
                <table class="status-table" id="statusTable" style="display:none;">
                    <thead>
                        <tr>
                            <th>Applicant & Email</th>
                            <th>College & Branch</th>
                            <th>Internship Domain</th>
                            <th>Period</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="statusContent"></tbody>
                </table>
            </div>
        </div>
        

    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="color: var(--primary);">Update Details</h3>
            <input type="text" id="newName" placeholder="Correct Name">
            <select id="newCourse">
                <option value="Full Stack Web Development">Full Stack Web Development</option>
                <option value="Data Science & AI">Data Science & AI</option>
                <option value="Python Programming">Python Programming</option>
                <option value="Automation Testing">Automation Testing</option>
            </select>
            <div class="modal-btns">
                <button class="btn-update" onclick="submitEdit()">Update</button>
                <button class="btn-close" onclick="closeEdit()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/status.js"></script>
    <script>
        const hamburgerBtn = document.getElementById('mobileMenuBtn');
        const navLinks = document.getElementById('navLinksList');
        const menuOverlay = document.getElementById('menuOverlay');

        function toggleMenu() {
            hamburgerBtn.classList.toggle('active');
            navLinks.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            
            if (navLinks.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }

        hamburgerBtn.addEventListener('click', toggleMenu);
        menuOverlay.addEventListener('click', toggleMenu);
    </script>
</body>
</html>
