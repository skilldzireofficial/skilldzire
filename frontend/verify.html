<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillDzire | Verify Certificate</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .verify-container { height: 80vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .verify-card { background: var(--dark-grey); padding: 40px; border-radius: 10px; width: 100%; max-width: 450px; text-align: center; border: 1px solid #222; }
        .verify-card h2 span { color: var(--primary); }
        .result-box { margin-top: 30px; padding: 20px; border-radius: 8px; background: #181818; display: none; border-left: 4px solid var(--primary); text-align: left; }
        .result-box p { margin-bottom: 10px; font-size: 0.9rem; }
        .status-text { font-weight: 800; text-transform: uppercase; color: var(--primary); }

        /* Custom Status Modal Styles */
        #statusModal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .status-content { background: #1a1a1a; margin: 15% auto; padding: 30px; border-radius: 10px; width: 90%; max-width: 350px; text-align: center; border-bottom: 4px solid var(--primary); }
        .status-content h3 { margin-bottom: 15px; color: var(--primary); }
        .status-content p { color: #ccc; margin-bottom: 20px; }
        .status-btn { padding: 10px 25px; background: var(--primary); border: none; color: #000; font-weight: 700; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Skill<span>Dzire</span></div>
        <ul class="nav-links">
            <li><a href="/homepage">Home</a></li>
            <li><a href="/checkstatus">Check Status</a></li>
            <li><a href="/verification">Verify</a></li>
        </ul>
    </nav>

    <div class="verify-container">
        <div class="verify-card">
            <h2>Verify <span>Status</span></h2>
            <p style="color: #888; margin-bottom: 25px; font-size: 0.9rem;">Check your internship certificate issuance status.</p>
            
            <div class="input-box">
             <input type="text" id="searchID" placeholder="Enter Certificate ID (e.g. SD-A1B2C3)" required>
            </div>
           <button class="btn-primary" onclick="verifyCertificate()" style="width: 100%; margin-top: 10px;">Verify Now</button>

            <div id="resultBox" class="result-box">
                <p><b>Candidate:</b> <span id="resName">--</span></p>
                <p><b>Course:</b> <span id="resCourse">--</span></p>
                <p><b>Status:</b> <span id="resStatus" class="status-text">--</span></p>
                <p id="resNote" style="font-size: 0.8rem; color: #666; margin-top: 10px;"></p>
            </div>
        </div>
    </div>

    <div id="statusModal">
        <div class="status-content">
            <h3 id="modalTitle">Notification</h3>
            <p id="modalMessage">Message goes here.</p>
            <button class="status-btn" onclick="closeStatusModal()">Dismiss</button>
        </div>
    </div>

    <script src="js/verify.js"></script>
</body>
</html>
