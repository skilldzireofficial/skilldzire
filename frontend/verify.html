<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkillDzire | Verify Certificate</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <div class="logo"><img src="assets/logo.jpg" alt=""></div>
        
        <button class="hamburger" id="mobileMenuBtn" aria-label="Toggle Navigation Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <ul class="nav-links" id="navLinksList">
            <li><a href="/homepage">Home</a></li>
            <li class="status-item"><a href="/checkstatus" class="status-btn">Check Status</a></li>
            <li class="active-link"><a href="/verification">Verify</a></li>
        </ul>
    </nav>

    <div class="nav-overlay" id="menuOverlay"></div>

    <div class="verify-container">
        <div class="verify-card">
            <h2>Verify <span>Status</span></h2>
            <p style="color: #888; margin-bottom: 25px; font-size: 0.9rem;">Check your internship certificate issuance status.</p>
            
            <div class="input-box">
             <input type="text" id="searchID" placeholder="Enter Certificate ID (e.g. SD-A1B2C3)" required>
            </div>
           <button class="btn-primary" onclick="verifyCertificate()" style="width: 100%; margin-top: 10px;">Verify Now</button>

            <div id="resultBox" class="result-box">
                <p><b>Candidate:</b> <span id="resName">--</span></p>
                <p><b>Course:</b> <span id="resCourse">--</span></p>
                <p><b>Status:</b> <span id="resStatus" class="status-text">--</span></p>
                <p><b>Issued At:</b> <span id="resDate"></span></p>
                <p id="resNote" style="font-size: 0.8rem; color: #666; margin-top: 10px;"></p>
            </div>
        </div>
    </div>

    <div id="statusModal">
        <div class="status-content">
            <h3 id="modalTitle">Notification</h3>
            <p id="modalMessage">Message goes here.</p>
            <button class="status-btn" onclick="closeStatusModal()">Dismiss</button>
        </div>
    </div>

    <script src="js/verify.js"></script>
    <script>
        const hamburgerBtn = document.getElementById('mobileMenuBtn');
        const navLinks = document.getElementById('navLinksList');
        const menuOverlay = document.getElementById('menuOverlay');

        function toggleMenu() {
            hamburgerBtn.classList.toggle('active');
            navLinks.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            
            if (navLinks.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }

        hamburgerBtn.addEventListener('click', toggleMenu);
        menuOverlay.addEventListener('click', toggleMenu);
    </script>
</body>
</html>
